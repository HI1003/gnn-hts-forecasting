dataset_name: Walmart

hierarchy:
  level_names: ["Total", "State", "Store", "Category"]
  level_sizes: [1, 3, 10, 30]
  total_nodes: 44

data:
  csv_pattern: "Walmart_dataset_{scenario}_promotion.csv"
  scenarios: ["with", "without"]
  data_dir: "datasets/walmart"

training:
  default_num_timesteps_in: 7
  default_num_timesteps_out: 1
  default_epochs: 150
  default_patience: 20
